<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission 🐾</title>
  <meta name="description" content="A gallery of Mission the dog." />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,900;1,400&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:  #fdf8f2;
      --bark:   #7a4f2e;
      --warm:   #c0733a;
      --golden: #e8a84c;
      --white-eye: #d7dcd3;
      --text:   #2c1a0e;
      --muted:  #7a6355;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem 1rem;
      flex-direction: column;
      gap: 0.4rem;
    }
    .site-title {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 900;
      color: var(--bark);
      line-height: 1;
    }
    .site-title em {
      font-style: italic;
      color: var(--golden);
    }
    .site-sub {
      font-size: 1rem;
      color: var(--muted);
    }

    /* ── Gallery (desktop: horizontal scroll) ── */
    .gallery-wrapper {
      height: 90vh;
      padding: 20px;
      overflow: hidden;
    }

    /*
      Fixed 6-row grid. Cell size = square (1 row unit).
      grid-auto-flow: column dense backfills holes left by spanning items,
      so the grid stays fully packed with no empty areas.
    */
    #gallery-track {
      height: 100%;
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      grid-auto-columns: 300px;
      grid-auto-flow: column dense;
      gap: 10px;
      width: max-content;
      will-change: transform;
    }

    .gal-item {
      width: 100%;
      height: 100%;
      filter: drop-shadow(2px 4px 8px rgba(44, 26, 14, 0.2));
      min-width: 0;
      min-height: 0;
    }
    .gal-item img,
    .gal-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      border-radius: 16px;
      display: block;
    }

    /*
      8-item repeating size pattern. Mix of tall/wide/square shapes.
      dense packing means the browser fills gaps automatically — if a wide
      item leaves a 2-row hole, the next short item slots right into it.
    */
    .gal-item                   { grid-row: span 3; grid-column: span 1; }
    .gal-item:nth-child(8n + 1) { grid-row: span 4; grid-column: span 1; }
    .gal-item:nth-child(8n + 2) { grid-row: span 2; grid-column: span 2; }
    .gal-item:nth-child(8n + 3) { grid-row: span 3; grid-column: span 1; }
    .gal-item:nth-child(8n + 4) { grid-row: span 2; grid-column: span 1; }
    .gal-item:nth-child(8n + 5) { grid-row: span 4; grid-column: span 2; }
    .gal-item:nth-child(8n + 6) { grid-row: span 2; grid-column: span 1; }
    .gal-item:nth-child(8n + 7) { grid-row: span 3; grid-column: span 2; }
    .gal-item:nth-child(8n + 8) { grid-row: span 3; grid-column: span 1; }

    /* ── Mobile: masonry-style columns ── */
    @media (max-width: 860px) {
      .gallery-wrapper {
        height: auto;
        padding: 8px;
        overflow: visible;
      }
      #gallery-track {
        display: block;
        width: 100%;
        height: auto;
        column-count: 2;
        column-gap: 8px;
      }
      .gal-item {
        display: block;
        break-inside: avoid;
        margin-bottom: 8px;
        width: 100%;
        height: auto;
        filter: drop-shadow(1px 2px 5px rgba(44, 26, 14, 0.15));
      }
      .gal-item img,
      .gal-item video {
        width: 100%;
        height: auto;
        border-radius: 12px;
        display: block;
        object-fit: cover;
      }
      /* Reset all desktop nth-child spans — not needed in column layout */
      .gal-item:nth-child(n) { grid-column: unset; grid-row: unset; }
    }

    /* ── Footer ── */
    footer {
      background: var(--text);
      padding: 2rem;
      text-align: center;
    }
    .footer-name {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--golden);
      margin-bottom: 0.25rem;
    }
    .footer-sub {
      font-size: 0.85rem;
      color: #7a6355;
    }

    /* ── Reveal ── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: none; }
  
    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(20, 10, 4, 0.93);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox-media {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 12px;
      object-fit: contain;
      display: block;
      pointer-events: none;
      animation: lbIn 0.2s ease;
    }
    #lightbox video#lightbox-media {
      pointer-events: none;
    }
    #lightbox-close {
      position: fixed;
      top: 1.2rem;
      right: 1.4rem;
      background: none;
      border: none;
      color: rgba(255,255,255,0.65);
      font-size: 2rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      transition: color 0.15s;
      z-index: 10000;
    }
    #lightbox-close:hover { color: #fff; }
    #lightbox-prev, #lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 1.4rem;
      width: 2.8rem;
      height: 2.8rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      z-index: 10000;
    }
    #lightbox-prev:hover, #lightbox-next:hover { background: rgba(255,255,255,0.22); }
    #lightbox-prev { left: 1.2rem; }
    #lightbox-next { right: 1.2rem; }
    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    .gal-item { cursor: zoom-in; }
</style>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/ScrollSmoother.min.js"></script>
</head>
<body>

    <!-- Lightbox -->
    <div id="lightbox">
      <button id="lightbox-close" aria-label="Close">&#x2715;</button>
      <button id="lightbox-prev" aria-label="Previous">&#8249;</button>
      <button id="lightbox-next" aria-label="Next">&#8250;</button>
    </div>
<div id="smooth-wrapper">
  <div id="smooth-content">

    <header class="site-header reveal">
      <h1 class="site-title">Mission</h1>
      <p class="site-sub">Has found his Forever Home!</p>
    </header>

    <section class="gallery">
      <div class="gallery-wrapper">
        <div id="gallery-track">
          <div class="gal-item">

          <div class="gal-item">

              <img src="mission_recovering.webp" alt="Mission">

            </div>

          <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_playing.webp" media="(max-width: 860px)">

            </picture>
            </div>

           <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_sniff.webp" media="(max-width: 860px)">
              <img src="mission_sniff.webp" alt="Mission">
            </picture>
            </div>

            <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_butt_sit.webp" media="(max-width: 860px)">
              <img src="mission_butt_sit.webp" alt="Mission">
            </picture>
            </div>

            <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_derp.webp" media="(max-width: 860px)">
              <img src="mission_derp.webp" alt="Mission">
            </picture>
            </div>

            <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_at_foster_home.webp" media="(max-width: 860px)">
              <img src="mission_at_foster_home.webp" alt="Mission">
            </picture>
            </div>

            <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_at_foster_image_with_others.webp" media="(max-width: 860px)">
              <img src="mission_at_foster_image_with_others.webp" alt="Mission">
            </picture>
            </div>


          <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_square.webp" media="(max-width: 860px)">
              <img src="mission_square.webp" alt="Mission">

          </div>

          <div class="gal-item">

          <div class="gal-item">

          </div>

          <div class="gal-item">

              <img src="mission_on_bed.webp" alt="Mission">
            </picture>
          </div>

          <div class="gal-item">
            <picture>
              <source srcset="mobile/mission_museum.webp" media="(max-width: 860px)">

          <div class="gal-item">

          <div class="gal-item">

              <source srcset="mobile/mission_dogs_with_void.webp" media="(max-width: 860px)">

          <div class="gal-item" style="grid-row: span 6;grid-column: span 2;max-width:400px;">

        </div>
      </div>
    </section>

    <footer>
      <div class="footer-name">Mission 🐾</div>
      <div class="footer-sub">We'll miss you</div>
    </footer>

  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother);

    ScrollSmoother.create({ smooth: 1, effects: true });

    const reveals = document.querySelectorAll('.reveal');
    function checkReveal() {
      reveals.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight + 60) el.classList.add('visible');
      });
    }
    checkReveal();
    window.addEventListener('scroll', checkReveal, { passive: true });

    if (window.innerWidth > 860) {
      const galleryWrapper = document.querySelector(".gallery-wrapper");
      if (galleryWrapper) {
        const track = document.getElementById("gallery-track");
        let trackWidth;

        function refresh() { trackWidth = track.scrollWidth; }
        refresh();

        gsap.to(track, {
          scrollTrigger: {
            scrub: 2,
            anticipatePin: 1,
            trigger: galleryWrapper,
            pin: galleryWrapper,
            markers: false,
            start: "top top",
            end: () => `+=${trackWidth}`,
            invalidateOnRefresh: true,
          },
          x: () => -(trackWidth - window.innerWidth),
          ease: "none"
        });

        ScrollTrigger.addEventListener("refreshInit", refresh);
      }
    }
  });

    // Lightbox
    (function() {
      const lb = document.getElementById('lightbox');
      const closeBtn = document.getElementById('lightbox-close');
      const prevBtn = document.getElementById('lightbox-prev');
      const nextBtn = document.getElementById('lightbox-next');
      let items = [];
      let current = 0;
      let mediaEl = null;

      function getMediaInfo(item) {
        const video = item.querySelector('video');
        if (video) {
          const src = video.querySelector('source') ? video.querySelector('source').src : video.src;
          return { type: 'video', src };
        }
        const img = item.querySelector('img');
        if (img) return { type: 'image', src: img.src };
        return null;
      }

      function showItem(index) {
        current = (index + items.length) % items.length;
        const info = getMediaInfo(items[current]);
        if (!info) return;

        if (mediaEl) mediaEl.remove();

        if (info.type === 'video') {
          mediaEl = document.createElement('video');
          mediaEl.id = 'lightbox-media';
          mediaEl.src = info.src;
          mediaEl.autoplay = true;
          mediaEl.loop = true;
          mediaEl.muted = true;
          mediaEl.controls = true;
          mediaEl.style.pointerEvents = 'all';
        } else {
          mediaEl = document.createElement('img');
          mediaEl.id = 'lightbox-media';
          mediaEl.src = info.src;
          mediaEl.alt = items[current].querySelector('img')?.alt || 'Mission';
        }

        lb.insertBefore(mediaEl, closeBtn);
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function close() {
        lb.classList.remove('open');
        if (mediaEl) { mediaEl.remove(); mediaEl = null; }
        document.body.style.overflow = '';
      }

      document.getElementById('gallery-track').addEventListener('click', function(e) {
        const item = e.target.closest('.gal-item');
        if (!item) return;
        items = Array.from(document.querySelectorAll('.gal-item'));
        showItem(items.indexOf(item));
      });

      closeBtn.addEventListener('click', function(e) { e.stopPropagation(); close(); });
      prevBtn.addEventListener('click', function(e) { e.stopPropagation(); showItem(current - 1); });
      nextBtn.addEventListener('click', function(e) { e.stopPropagation(); showItem(current + 1); });
      lb.addEventListener('click', function(e) { if (e.target === lb) close(); });

      document.addEventListener('keydown', function(e) {
        if (!lb.classList.contains('open')) return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') showItem(current - 1);
        if (e.key === 'ArrowRight') showItem(current + 1);
      });
    })();

  </script>
</body>
</html>
